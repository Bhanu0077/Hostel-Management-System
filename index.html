<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HMS Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 340px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: white;
            text-align: center;
        }

        .dropdown {
            position: relative;
            margin-bottom: 15px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            text-align: left;
        }

        .dropdown-content {
            position: absolute;
            width: 100%;
            background: white;
            color: black;
            border-radius: 8px;
            display: none;
        }

        .dropdown-content div {
            padding: 10px;
            cursor: pointer;
        }

        .dropdown-content div:hover {
            background: #eee;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .password-box {
            position: relative;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            margin-top: 10px;
            font-size: 14px;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>HMS Login</h2>

        <div class="dropdown">
            <div class="dropdown-btn" onclick="toggleDropdown()">
                <span id="selectedRole">Select Role</span>
            </div>
            <div class="dropdown-content" id="menu">
                <div onclick="selectRole('Admin')">Admin</div>
                <div onclick="selectRole('Student')">Student</div>
            </div>
        </div>

        <input type="email" id="email" placeholder="Enter Email">

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter Password">
            <span class="eye" onclick="togglePassword('password', this)">👁️</span>
        </div>

        <button onclick="login()">Login</button>

        <div class="footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script>
        let role = "";

        function toggleDropdown() {
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        }

        function selectRole(r) {
            role = r;
            selectedRole.innerText = r;
            menu.style.display = "none";
        }

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.innerText = "🙈";
            } else {
                input.type = "password";
                el.innerText = "👁️";
            }
        }

        function login() {
            if (!role) { alert("Select role"); return; }
            if (!email.value || !password.value) { alert("Fill all fields"); return; }
            alert("Login success (UI)");
        }

        window.onclick = function (e) {
            if (!e.target.matches('.dropdown-btn')) {
                menu.style.display = "none";
            }
        }
    </script>

</body>

</html>
