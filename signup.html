<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HMS Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 360px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: white;
            text-align: center;
        }

        .dropdown {
            position: relative;
            margin-bottom: 12px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .dropdown-content {
            position: absolute;
            width: 100%;
            background: white;
            color: black;
            border-radius: 8px;
            display: none;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .password-box {
            position: relative;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .otp-container {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        .otp-container input {
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 8px;
            font-weight: bold;
        }

        .send-otp {
            background: #00c6ff;
            color: white;
        }

        .verify {
            background: white;
            color: #333;
        }

        #otpMessage {
            margin-top: 8px;
            font-size: 14px;
        }

        .success {
            color: #00ffcc;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>HMS Signup</h2>

        <div class="dropdown">
            <div class="dropdown-btn" onclick="toggleDropdown()">
                <span id="selectedRole">Select Role</span>
            </div>
            <div class="dropdown-content" id="menu">
                <div onclick="selectRole('Admin')">Admin</div>
                <div onclick="selectRole('Student')">Student</div>
            </div>
        </div>

        <input type="email" id="email" placeholder="Enter Email">

        <div class="password-box">
            <input type="password" id="password" placeholder="Create Password">
            <span class="eye" onclick="togglePassword('password', this)">👁️</span>
        </div>

        <button class="send-otp" id="otpBtn" onclick="sendOTP()">Send OTP</button>
        <div id="otpMessage"></div>

        <div class="otp-container" id="otpContainer">
            <input maxlength="1"><input maxlength="1"><input maxlength="1">
            <input maxlength="1"><input maxlength="1"><input maxlength="1">
        </div>

        <button class="verify" onclick="verifyOTP()">Verify & Signup</button>
    </div>

    <script>
        let role = "", countdown = 30, timer;

        function toggleDropdown() { menu.style.display = menu.style.display === "block" ? "none" : "block"; }
        function selectRole(r) { role = r; selectedRole.innerText = r; menu.style.display = "none"; }

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
            el.innerText = input.type === "password" ? "👁️" : "🙈";
        }

        function sendOTP() {
            if (!email.value) { otpMessage.innerText = "Enter email"; otpMessage.className = "error"; return; }
            otpMessage.innerText = "OTP sent"; otpMessage.className = "success";

            otpBtn.disabled = true;
            countdown = 30;
            otpBtn.innerText = `Resend in ${countdown}s`;

            timer = setInterval(() => {
                countdown--;
                otpBtn.innerText = `Resend in ${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    otpBtn.disabled = false;
                    otpBtn.innerText = "Resend OTP";
                }
            }, 1000);
        }

        /* OTP UX */
        const inputs = document.querySelectorAll("#otpContainer input");

        inputs.forEach((input, i) => {
            input.addEventListener("input", () => {
                if (input.value && i < 5) inputs[i + 1].focus();
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });
        });

        otpContainer.addEventListener("paste", (e) => {
            e.preventDefault();
            const data = e.clipboardData.getData("text").slice(0, 6);
            inputs.forEach((inp, i) => inp.value = data[i] || "");
        });

        function verifyOTP() {
            let otp = "";
            inputs.forEach(i => otp += i.value);

            if (!role) { otpMessage.innerText = "Select role"; otpMessage.className = "error"; return; }
            if (otp.length !== 6) { otpMessage.innerText = "Enter full OTP"; otpMessage.className = "error"; return; }

            otpMessage.innerText = "Signup success"; otpMessage.className = "success";
        }
    </script>

</body>

</html>
